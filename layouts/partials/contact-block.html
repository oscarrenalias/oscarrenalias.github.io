{{ with site.GetPage "/contact-footer" }}
<section class="home-section contact-block">
  <h3>{{ .Title }}</h3>
  {{ .Content }}
  <ul class="social-links">
    <li>
      <a class="cv-link" href="{{ .Params.cv_url }}" aria-label="CV">CV</a>
    </li>
    <li>
      <a href="{{ .Params.github_url }}" aria-label="GitHub">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .5A12 12 0 0 0 8.2 23.9c.6.1.8-.3.8-.6v-2.3c-3.3.7-4-1.4-4-1.4-.6-1.4-1.3-1.8-1.3-1.8-1.1-.8.1-.8.1-.8 1.2.1 1.9 1.3 1.9 1.3 1.1 1.9 2.8 1.3 3.5 1 .1-.8.4-1.3.7-1.6-2.7-.3-5.6-1.4-5.6-6.1 0-1.4.5-2.6 1.3-3.5-.1-.3-.6-1.7.1-3.5 0 0 1.1-.4 3.6 1.3a12.2 12.2 0 0 1 6.6 0c2.5-1.7 3.6-1.3 3.6-1.3.7 1.8.2 3.2.1 3.5.8.9 1.3 2.1 1.3 3.5 0 4.7-2.9 5.8-5.7 6.1.5.4.8 1.1.8 2.3v3.4c0 .4.2.7.8.6A12 12 0 0 0 12 .5z"/></svg>
      </a>
    </li>
    <li>
      <a href="{{ .Params.linkedin_url }}" aria-label="LinkedIn">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4.98 3.5a2.5 2.5 0 1 0 0 5.01 2.5 2.5 0 0 0 0-5zM3 9h4v12H3zM9 9h3.8v1.7h.1c.5-1 1.8-2.1 3.8-2.1 4 0 4.8 2.6 4.8 6V21h-4v-5.3c0-1.3 0-2.8-1.8-2.8s-2 1.4-2 2.7V21H9z"/></svg>
      </a>
    </li>
    {{ with .Params.bluesky_url }}
    <li>
      <a href="{{ . }}" aria-label="Bluesky">
        <img src="{{ "/icons/bluesky-logo.svg" | relURL }}" alt="" class="social-icon-img" loading="lazy" decoding="async">
      </a>
    </li>
    {{ end }}
    <li>
      <a href="{{ .Params.slideshare_url }}" aria-label="SlideShare">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-6v1.5h2.5a1 1 0 1 1 0 2h-9a1 1 0 1 1 0-2H10V18H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm0 2v10h16V6zm3 2.8 2.7 2L7 12.7V8.8zm4.5 0h5a1 1 0 1 1 0 2h-5a1 1 0 1 1 0-2zm0 3h3.5a1 1 0 1 1 0 2h-3.5a1 1 0 1 1 0-2z"/></svg>
      </a>
    </li>
    <li>
      <a href="mailto:{{ .Params.email }}" aria-label="Email">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18a1 1 0 0 1 1 1v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V7a1 1 0 0 1 1-1zm0 2v.5l9 5.6 9-5.6V8l-9 5.6L3 8z"/></svg>
      </a>
    </li>
  </ul>
</section>
{{ end }}
