<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <title>{{ if .Title }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0e14;
      --surface: #121826;
      --surface-border: #273247;
      --text: #e9eef7;
      --text-muted: #a8b3c7;
      --accent: #7cc7ff;
      --accent-soft: #223958;
      --heading-1: #d7e8ff;
      --heading-2: #5a8bbd;
      --page-max-width: 860px;
      --page-gutter: 1.25rem;
      --content-width: 72ch;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
      font-weight: 350;
      font-size: 15px;
      line-height: 1.65;
    }
    a { color: var(--accent); text-underline-offset: 0.2em; }
    a:hover { text-decoration-thickness: 0.14em; }
    .page {
      max-width: var(--page-max-width);
      margin: 0 auto;
      padding: 3rem var(--page-gutter) 4.5rem;
    }
    .site-header h1 {
      margin: 0 0 0.9rem;
      font-family: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
      font-size: clamp(1.7rem, 3.4vw, 2.45rem);
      line-height: 1.1;
      letter-spacing: 0.01em;
      font-weight: 400;
      color: var(--heading-1);
    }
    .site-header h1 a {
      color: var(--heading-1);
      text-decoration: none;
    }
    .intro {
      color: var(--text-muted);
      max-width: var(--content-width);
      margin-bottom: 1.25rem;
    }
    .intro p { margin: 0 0 0.9rem; }
    .site-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem 0.65rem;
      margin-bottom: 1.8rem;
      padding-top: 0.2rem;
    }
    .site-nav a {
      display: inline-block;
      padding: 0.2rem 0.58rem;
      border-radius: 999px;
      border: 1px solid var(--surface-border);
      color: var(--text);
      text-decoration: none;
      font-size: 0.81rem;
    }
    .site-nav a:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .site-main {
      max-width: var(--content-width);
    }
    h2, h3 {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      line-height: 1.2;
      font-weight: 400;
      margin: 0 0 0.65rem;
      letter-spacing: -0.04em;
    }
    h2 {
      font-size: clamp(1.2rem, 1.65vw, 1.55rem);
      color: var(--heading-2);
    }
    h3 { font-size: clamp(1rem, 1.4vw, 1.2rem); margin-top: 2.7rem; }
    p, ul { margin: 0 0 1rem; }
    ul { padding-left: 1.2rem; }
    .entry-list {
      padding: 0;
      list-style: none;
    }
    .entry-list li { margin: 0 0 0.55rem; }
    .video-embed {
      margin: 0.65rem 0 0.45rem;
      border: 1px solid var(--surface-border);
      border-radius: 0.6rem;
      overflow: hidden;
      background: #0a0f1a;
    }
    .site-main li:has(> .video-embed),
    .site-main li:has(> .video-embed-title) {
      list-style: none;
      margin-left: -1.2rem;
      margin-bottom: 1.25rem;
    }
    .latest-talk-list li:has(> .video-embed),
    .latest-talk-list li:has(> .video-embed-title) {
      margin-left: 0;
    }
    .video-embed-title {
      margin: 0 0 0.45rem;
      font-family: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
      font-size: 1.02rem;
      line-height: 1.35;
      color: var(--text);
      font-weight: 600;
    }
    .video-embed iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 0;
      display: block;
    }
    .video-embed-link {
      margin: 0 0 0.95rem;
      font-size: 0.84rem;
    }
    .video-embed-link a {
      display: inline-block;
      border: 1px solid var(--surface-border);
      border-radius: 999px;
      padding: 0.16rem 0.62rem;
      text-decoration: none;
      color: var(--text-muted);
    }
    .video-embed-link a:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .more-talks-link {
      margin: 0.25rem 0 0;
      font-size: 0.84rem;
    }
    .more-talks-link a {
      color: var(--text-muted);
    }
    .more-talks-link a:hover {
      color: var(--accent);
    }
    .home-section {
      border-top: 1px solid var(--surface-border);
      padding-top: 1.45rem;
      margin-top: 2.5rem;
    }
    .home-section:first-of-type {
      border-top: 0;
      padding-top: 0;
      margin-top: 0;
    }
    .contact-block {
      margin-top: 3.4rem;
      padding-top: 1.45rem;
      text-align: left;
    }
    .contact-block p {
      color: var(--text-muted);
      margin-bottom: 1rem;
    }
    .social-links {
      display: flex;
      justify-content: flex-start;
      gap: 0.8rem;
      flex-wrap: wrap;
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .social-links a {
      width: 2.15rem;
      height: 2.15rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      border: 1px solid var(--surface-border);
      border-radius: 999px;
      text-decoration: none;
      background: var(--surface);
    }
    .social-links a:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }
    .social-links svg {
      width: 1.05rem;
      height: 1.05rem;
      fill: currentColor;
    }
    .social-links .social-icon-img {
      width: 1.85rem;
      height: 1.85rem;
      display: block;
      object-fit: contain;
    }
    .social-links .cv-link {
      width: auto;
      padding: 0 0.65rem;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.78rem;
      letter-spacing: 0.02em;
    }
    small, .meta {
      color: var(--text-muted);
      font-size: 0.73rem;
    }
    .article-meta {
      margin: -0.15rem 0 0.8rem;
      display: grid;
      gap: 0.2rem;
    }
    .meta-author {
      font-size: 0.78rem;
      line-height: 1.35;
    }
    .meta-dates {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem 0.85rem;
      line-height: 1.35;
    }
    .article-hero {
      position: relative;
      width: min(
        calc(var(--page-max-width) - (2 * var(--page-gutter))),
        calc(100vw - (2 * var(--page-gutter)))
      );
      margin: 0 0 1rem;
      min-height: clamp(12rem, 38vw, 19rem);
      overflow: hidden;
      border-radius: 0.6rem;
      background: #0f1827;
    }
    .article-hero img {
      display: block;
      width: 100%;
      height: 100%;
      min-height: inherit;
      margin: 0;
      border: 0;
      border-radius: 0;
      object-fit: cover;
    }
    .article-hero-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      padding: clamp(1rem, 2.5vw, 1.8rem);
      background:
        linear-gradient(to top, rgba(8, 14, 23, 0.85) 8%, rgba(8, 14, 23, 0.25) 54%, rgba(8, 14, 23, 0.12) 100%);
    }
    .article-hero-title {
      margin: 0;
      color: #ffffff;
      font-size: clamp(1.3rem, 3vw, 2.05rem);
      line-height: 1.12;
      text-wrap: balance;
      text-shadow: 0 1px 8px rgba(8, 12, 20, 0.65);
    }
    .toc {
      margin: 1.1rem 0 1.6rem;
      border: 1px solid var(--surface-border);
      border-radius: 0.6rem;
      background: var(--surface);
      overflow: hidden;
    }
    .toc summary {
      cursor: pointer;
      padding: 0.62rem 0.82rem;
      font-family: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
      font-size: 0.92rem;
      color: var(--heading-1);
      list-style-position: inside;
    }
    .toc[open] summary {
      border-bottom: 1px solid var(--surface-border);
    }
    .toc-content {
      padding: 0.55rem 0.82rem 0.75rem;
    }
    .toc-content nav > ul {
      margin: 0;
      padding-left: 1.1rem;
    }
    .toc-content ul {
      margin: 0.3rem 0 0;
    }
    .toc-content li {
      margin: 0.2rem 0;
      line-height: 1.45;
      font-size: 0.88rem;
    }
    .site-main img {
      display: block;
      width: 100%;
      max-width: 100%;
      height: auto;
      margin: 1.1rem 0 1.35rem;
      border: 1px solid var(--surface-border);
      border-radius: 0.6rem;
    }
    .site-main .article-hero img {
      height: 100%;
      min-height: inherit;
      margin: 0;
      border: 0;
      border-radius: 0;
      object-fit: cover;
    }
    pre, code {
      background: #111623;
      border-radius: 0.3rem;
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.9em;
    }
    pre { padding: 0.75rem; overflow-x: auto; }
    code { padding: 0.08rem 0.25rem; }
    hr {
      border: 0;
      border-top: 1px solid var(--surface-border);
      margin: 0 0 1.9rem;
    }
    @media (max-width: 640px) {
      body { font-size: 13.5px; }
      .page { padding-top: 2.2rem; }
      .site-nav { margin-bottom: 1.3rem; }
      h3 { margin-top: 2.4rem; }
      .article-hero {
        min-height: 11rem;
      }
      .article-hero-overlay {
        padding: 0.9rem;
      }
      .home-section {
        margin-top: 2.1rem;
        padding-top: 1.2rem;
      }
      .contact-block {
        margin-top: 2.6rem;
        padding-top: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="site-header">
      <h1><a href="{{ "/" | relURL }}">{{ .Site.Title }}</a></h1>
      {{ if .IsHome }}
      <div class="intro">{{ .Content }}</div>
      {{ end }}
      <nav class="site-nav">
        <a href="{{ "/" | relURL }}">Home</a>
        <a href="{{ "/articles/" | relURL }}">Articles</a>
        <a href="{{ "/talks/" | relURL }}">Talks and Presentations</a>
        <a href="{{ "/cv/" | relURL }}">My CV</a>
      </nav>
      <hr>
    </header>
    <main class="site-main">
      {{ block "main" . }}{{ end }}
    </main>
  </div>
</body>
</html>
